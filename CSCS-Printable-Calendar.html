function renderMonth(year, month, title) {
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date().toISOString().split('T')[0];

    let html = `<div class="month"><div class="month-title">${title}</div>`;
    html += '<div class="cal-grid">';
    dayNames.forEach(d => { html += `<div class="cal-header">${d}</div>`; });
    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const p = plan[ds];
        html += `<div class="cal-day">`;
        html += `<div style="display:flex;justify-content:space-between;"><span class="day-num">${d}</span><span class="checkbox"></span></div>`;
        if (p) {
            html += `<span class="tag tag-${p.tag}">${p.label}</span><br>`;
            html += `<span class="topic">${p.topic}</span>`;
        }
        html += '</div>';
    }
    html += '</div></div>';
    return html;
}
